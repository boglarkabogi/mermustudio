<!doctype html>
<html lang="hu">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

    <title>Mérmű Studio - Cseresnyés - Csopak</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="carousel.css">
    <link rel="stylesheet" href="navbar.css">

</head>
  <body>
   
    <div id="carouselExample" class="carousel slide">
        <div class="carousel-inner">
            <div class="carousel-item active">
              <img src="Képek/Csopak-Cseresnyes/bg.jpg" class="d-block w-100" alt="...">
            </div>
            <div class="carousel-item">
              <img src="Képek/Csopak-Cseresnyes/IMG_5914.jpg" class="d-block w-100" alt="...">
            </div>
            <div class="carousel-item" id="tornac">
              <img src="Képek/Csopak-Cseresnyes/IMG_5927.jpg" class="d-block w-100" alt="...">
            </div>
            <div class="carousel-item">
              <img src="Képek/Csopak-Cseresnyes/IMG_5924.jpg" class="d-block w-100" alt="...">
            </div>
            <div class="carousel-item">
              <img src="Képek/Csopak-Cseresnyes/IMG_5925.jpg" class="d-block w-100" alt="...">
            </div>
            <div class="carousel-item">
              <img src="Képek/Csopak-Cseresnyes/IMG_5951.jpg" class="d-block w-100" alt="...">
            </div>
            <div class="carousel-item">
              <img src="Képek/Csopak-Cseresnyes/IMG_5935.jpg" class="d-block w-100" alt="...">
            </div>
          </div>          
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
            <img src="Képek/left.png" alt="">
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
            <img src="Képek/right.png" alt="">
            <span class="visually-hidden">Next</span>
        </button>
    </div>


    <header id="navbar"></header>
    <script>
      fetch("navbar.html")
        .then(res => res.text())
        .then(html => {
          document.getElementById("navbar").innerHTML = html;
          document.querySelector(".navbar").classList.add("navbar-dark");
          document.querySelector(".navbar").classList.add("fixed-top");

          initLanguage();
          highlightActive();
        });
    </script>

    <script src="lang.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq" crossorigin="anonymous"></script>
  </body>
</html>
